services:
  db:
    image: esteebanosoriio/bookit-db:latest
    container_name: bookit-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookit}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bookit-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bookit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: esteebanosoriio/bookit-backend:latest
    container_name: bookit-backend
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-bookit}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - bookit-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: esteebanosoriio/bookit-frontend:latest
    container_name: bookit-frontend
    restart: always
    ports:
      - "8082:80"
    networks:
      - bookit-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  bookit-network:
    driver: bridge

volumes:
  postgres_data:
