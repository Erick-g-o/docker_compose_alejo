version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bookit-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookit}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d bookit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    image: usuario/bookit-backend:latest
    container_name: bookit-backend
    restart: always
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-bookit}
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3001
    image: usuario/bookit-frontend:latest
    container_name: bookit-frontend
    restart: always
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
